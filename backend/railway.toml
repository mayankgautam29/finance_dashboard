# Railway: set the service root directory to `backend` (Settings → Root Directory).
# Variables: copy from `backend/.env.example` in the Railway dashboard.

[build]
builder = "nixpacks"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/docs"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
